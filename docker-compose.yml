version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - FLASK_ENV=development
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - qyantram-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - VITE_API_BASE_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qyantram-network

networks:
  qyantram-network:
    driver: bridge
